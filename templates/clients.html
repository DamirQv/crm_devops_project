<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
    <style>
        body { font-family: Arial; background: #f5f7fb; }

        .container {
            max-width: 900px;
            margin: 50px auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>

<a href="/" style="text-decoration: none; color: white;">
        <button style="background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Back to Home</button>
    </a>

<!-- Подключение Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Навигационное меню -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CRM System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/clients/">Clients</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Стили для отступа от навигации -->
    <style>
        body {
            padding-top: 56px;
        }
    </style>

    <!-- Существующий код -->
    <div class="container">
        <h1>Clients</h1>

        <form method="GET">
            <input type="text" name="q" placeholder="Search client...">
        </form>

        {% for client in clients %}
            <div class="card" onclick="alert('Client: {{ client.name }}')">
                <h3>{{ client.name }}</h3>
                <p>{{ client.email }}</p>
                <p>{{ client.phone }}</p>
            </div>
        {% endfor %}

        <a href="/admin/clients/client/add/" style="display:inline-block;margin-bottom:15px;">
    ➕ Add Client
</a>
    </div>

</body>
</html>
