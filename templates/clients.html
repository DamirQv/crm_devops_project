<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
    <style>
        body { font-family: Arial; background: #f5f7fb; }

        .container {
            max-width: 900px;
            margin: 50px auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Clients</h1>

    <form method="GET">
        <input type="text" name="q" placeholder="Search client...">
    </form>

    {% for client in clients %}
        <div class="card">
            <h3>{{ client.name }}</h3>
            <p>{{ client.email }}</p>
            <p>{{ client.phone }}</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
